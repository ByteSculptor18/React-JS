<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Example</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        function ChatInput({ inputText, setInputText, sendMessage }) {
            return (
                <>
                    <input 
                        placeholder="Send a message..." 
                        size="40"
                        value={inputText}
                        onChange={(e) => setInputText(e.target.value)}
                        onKeyDown={(e) => {
                            if (e.key === "Enter") sendMessage();
                        }}
                    />
                    <button onClick={sendMessage}>Send</button>
                </>
            );
        }

        function ChatMessage({ text, sender }) {
            if (sender === 'bot') {
                return (
                    <div>
                        <img src="Robot.png" alt="Bot" style={{ 
                            width: '20px', 
                            height: '20px', 
                            marginRight: '10px' 
                        }} />
                        <span>{text}</span>
                    </div>
                );
            }

            return (
                <div>
                    <span>{text}</span>
                    <img src="User.png" alt="User" style={{ 
                        width: '20px', 
                        height: '20px', 
                        marginLeft: '10px' 
                    }} />
                </div>
            );
        }

        function App() {
            const [chatMessages, setChatMessages] = React.useState([
                { text: "How are you?", sender: "user", key: 1 },
                { text: "I am fine, thank you!", sender: "bot", key: 2 }
            ]);

            const [inputText, setInputText] = React.useState("");

            function sendMessage() {
                if (!inputText.trim()) return;

                const newUserMessage = {
                    text: inputText,
                    sender: "user",
                    key: Date.now()
                };

                // Add user message
                setChatMessages(prev => [...prev, newUserMessage]);

                // Optional: auto bot reply
                setTimeout(() => {
                    const botReply = {
                        text: "I received: " + inputText,
                        sender: "bot",
                        key: Date.now() + 1
                    };

                    setChatMessages(prev => [...prev, botReply]);
                }, 500);

                setInputText("");
            }

            return (
                <div>
                    <h2>Chatbot</h2>

                    <ChatInput 
                        inputText={inputText}
                        setInputText={setInputText}
                        sendMessage={sendMessage}
                    />

                    <div style={{ marginTop: "20px" }}>
                        {chatMessages.map((msg) => (
                            <ChatMessage 
                                key={msg.key} 
                                text={msg.text} 
                                sender={msg.sender} 
                            />
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
