<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Example</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function ChatInput() {
            return (
                <div>
                    <input 
                        placeholder="Send a message..." 
                        size="40" />
                    <button>Send</button>
                </div>
            );
        }

        function ChatMessage({ text, sender }) {
            //console.log(text);
            const message = text;
            const imgSender = sender;
            if (imgSender === 'bot') {
                return (
                    <div>
                        <img src="Robot.png" alt="Bot" style={{ 
                            width: '20px', 
                            height: '20px', 
                            marginRight: '10px' 
                        }} />
                        <span>{message}</span>
                    </div>
                );
            }
            return (
                <div>
                    <span>{message}</span>
                    <img src="User.png" alt="User" style={{ 
                        width: '20px', 
                        height: '20px', 
                        marginLeft: '10px' 
                    }} />
                </div>
            );
        }

        function App() {
            const chatMessages = [
                { text: "How are you?", sender: "user", key: 1 },
                { text: "I am fine, thank you!", sender: "bot", key: 2 },
                { text: "What can you do?", sender: "user", key: 3 },
                { text: "I can chat with you!", sender: "bot", key: 4 }
            ];
            return (
                <div>
                    <h2>Chatbot</h2>
                    <ChatInput />
                    {chatMessages.map((msg) => (
                        <ChatMessage 
                            key={msg.key} 
                            text={msg.text} 
                            sender={msg.sender} 
                        />
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
