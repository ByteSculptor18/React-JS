<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Example</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function ChatInput() {
            return (
                <div>
                    <input placeholder="Send a message..." size="40" />
                    <button>Send</button>
                </div>
            );
        }

        function ChatMessage({ text, sender }) {
            //console.log(text);
            const message = text;
            const imgSender = sender;
            if (imgSender === 'bot') {
                return (
                    <div>
                        <img src="Robot.png" alt="Bot" style={{ width: '20px', height: '20px', marginRight: '10px' }} />
                        <span>{message}</span>
                    </div>
                );
            }
            return (
                <div>
                    <span>{message}</span>
                    <img src="User.png" alt="User" style={{ width: '20px', height: '20px', marginLeft: '10px' }} />
                </div>
            );
        }

        function Chatbot() {
            return (
                <div>
                    <h2>Chatbot</h2>
                    <ChatInput />
                    <ChatMessage text="How are you?" sender="user" />
                    <ChatMessage text="I am fine, thank you!" sender="bot" />
                    <ChatMessage text="What can you do?" sender="user" />
                    <ChatMessage text="I can chat with you!" sender="bot" />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Chatbot />);
    </script>
</body>
</html>
